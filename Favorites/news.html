<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제약시장 뉴스</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic','맑은 고딕',Georgia,sans-serif; background:#f5f2ec; color:#1a1a1a; min-height:100vh; }

    /* ══ MASTHEAD ══ */
    .masthead { background:#12233d; color:#fff; text-align:center; padding:28px 24px 18px; border-bottom:3px solid #c8a96e; }
    .masthead-eyebrow { font-size:.68rem; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:#c8a96e; margin-bottom:7px; }
    .masthead h1 { font-size:2rem; font-weight:900; letter-spacing:-.02em; margin-bottom:5px; }
    .masthead-tagline { font-size:.78rem; color:rgba(255,255,255,.45); margin-bottom:14px; }
    .masthead-meta { display:flex; justify-content:center; gap:20px; font-size:.7rem; color:rgba(255,255,255,.4); border-top:1px solid rgba(255,255,255,.1); padding-top:12px; flex-wrap:wrap; }

    /* ══ TOOLBAR ══ */
    .toolbar { background:#fff; border-bottom:1px solid #e5e0d5; padding:10px 20px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .toolbar-inner { max-width:1080px; margin:0 auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .search-wrap { position:relative; flex:1; min-width:130px; max-width:200px; }
    .search-wrap input { width:100%; padding:6px 24px 6px 10px; border:1px solid #ddd; border-radius:6px; font-size:.78rem; font-family:inherit; color:#333; outline:none; background:#faf9f7; transition:border-color .2s; }
    .search-wrap input:focus { border-color:#12233d; }
    .search-wrap input::placeholder { color:#bbb; }
    .search-wrap .clear-btn { position:absolute; right:7px; top:50%; transform:translateY(-50%); background:none; border:none; color:#bbb; cursor:pointer; font-size:.78rem; display:none; padding:0; }

    /* 탭 그룹 */
    .tab-group { display:flex; gap:3px; flex-wrap:wrap; align-items:center; }
    .tab-sep { width:1px; height:16px; background:#e0ddd6; margin:0 4px; }
    .tab-group-label { font-size:.62rem; font-weight:700; color:#bbb; letter-spacing:.05em; text-transform:uppercase; white-space:nowrap; }

    .tab { padding:4px 10px; font-size:.72rem; font-weight:700; color:#666; border:1px solid #e0ddd6; border-radius:20px; cursor:pointer; background:#faf9f7; font-family:inherit; transition:all .15s; display:flex; align-items:center; gap:4px; }
    .tab:hover { border-color:#12233d; color:#12233d; }
    .tab.active { background:#12233d; color:#fff; border-color:#12233d; }
    .tab.fda-tab.active  { background:#c0392b; border-color:#c0392b; }
    .tab.ema-tab.active  { background:#1565c0; border-color:#1565c0; }
    .tab.who-tab.active  { background:#00695c; border-color:#00695c; }
    .tab-count { font-size:.6rem; font-weight:700; background:rgba(0,0,0,.1); padding:1px 5px; border-radius:8px; }
    .tab.active .tab-count { background:rgba(255,255,255,.25); }

    .toolbar-right { display:flex; align-items:center; gap:6px; margin-left:auto; }
    .date-filter, .group-toggle { display:flex; gap:3px; }
    .date-btn, .grp-btn { padding:4px 9px; font-size:.68rem; font-weight:600; color:#888; border:1px solid #e0ddd6; border-radius:5px; background:#faf9f7; cursor:pointer; font-family:inherit; transition:all .15s; }
    .date-btn:hover, .grp-btn:hover { color:#12233d; border-color:#12233d; }
    .date-btn.active, .grp-btn.active { background:#12233d; color:#fff; border-color:#12233d; }
    .divider-v { width:1px; height:16px; background:#e0ddd6; }

    /* ══ MAIN / 2컬럼 레이아웃 ══ */
    main { padding:0; }
    .layout { max-width:1280px; margin:0 auto; padding:22px 20px 56px; display:grid; grid-template-columns:1fr 360px; gap:24px; align-items:start; }
    .layout-main { min-width:0; }
    .layout-side { position:sticky; top:94px; align-self:start; display:flex; flex-direction:column; gap:12px; }

    /* 사이드바 내 정책·해외 가로 배치 */
    .side-hi-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .layout-side .hi-section { margin-bottom:0; }
    .layout-side .hi-section.domestic { border-width:1px; }
    .layout-side .hi-section.intl { border-width:1px; }
    .layout-side .hi-header { padding:9px 13px; }
    .layout-side .hi-header-title { font-size:.65rem; gap:5px; }
    .layout-side .hi-period { display:none; }
    .layout-side .collapse-btn { display:none; }
    .layout-side .hi-item { padding:8px 12px; gap:7px; }
    .layout-side .hi-item .kw { display:none; }
    .layout-side .hi-item-titles a { font-size:.8rem; }
    .layout-side .hi-item-titles .en-title { display:none; }
    .layout-side .hi-item-meta { display:none; }
    .layout-side .trend-section { margin-bottom:0; }
    .layout-side .trend-label { width:90px; font-size:.67rem; }
    .layout-side .trend-count { font-size:.64rem; }

    /* 뷰 토글 버튼 */
    .view-toggle { display:flex; gap:2px; }
    .view-btn { padding:4px 8px; font-size:.8rem; color:#888; border:1px solid #e0ddd6; border-radius:5px; background:#faf9f7; cursor:pointer; transition:all .15s; line-height:1; }
    .view-btn:hover { color:#12233d; border-color:#12233d; }
    .view-btn.active { background:#12233d; color:#fff; border-color:#12233d; }

    /* 리스트 뷰 */
    .list-view .card-grid { display:flex; flex-direction:column; gap:0; background:#fff; border-radius:10px; border:1px solid #e8e3da; overflow:hidden; }
    .list-view .news-card { flex-direction:row; align-items:center; gap:10px; padding:9px 13px; border-radius:0; border:none; border-bottom:1px solid #f0ece4; box-shadow:none !important; transform:none !important; }
    .list-view .news-card:last-child { border-bottom:none; }
    .list-view .news-card:hover { background:#faf9f7; transform:none !important; box-shadow:none !important; }
    .list-view .news-card.featured { border-left:3px solid #c8a96e; background:linear-gradient(to right,#fffdf7,#fff); }
    .list-view .news-card .featured-label,
    .list-view .news-card .card-title-en,
    .list-view .news-card .memo-preview,
    .list-view .news-card .cross-issue-tag { display:none; }
    .list-view .news-card .memo-box { display:none !important; }
    .list-view .news-card .card-top { flex-shrink:0; }
    .list-view .news-card .card-title-ko { font-size:.82rem; flex:1; }
    .list-view .news-card .card-footer { border:none; padding:0; margin:0; flex-direction:column; align-items:flex-end; flex-shrink:0; gap:2px; }
    .list-view .group-block { margin-bottom:16px; }

    /* 반응형 */
    @media(max-width:900px) {
      .layout { grid-template-columns:1fr; }
      .layout-side { position:static; max-height:none; overflow:visible; }
      .side-hi-row { grid-template-columns:1fr 1fr; }
      .layout-side .hi-period { display:inline; }
      .layout-side .collapse-btn { display:inline-flex; }
    }
    @media(max-width:560px) {
      .side-hi-row { grid-template-columns:1fr; }
    }

    /* ── 키워드 트렌드 ── */
    .trend-section { background:#12233d; border-radius:14px; padding:18px 22px; margin-bottom:24px; box-shadow:0 4px 20px rgba(18,35,61,.15); }
    .trend-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .trend-title { font-size:.7rem; font-weight:900; letter-spacing:.15em; text-transform:uppercase; color:#c8a96e; }
    .trend-subtitle { font-size:.67rem; color:rgba(255,255,255,.3); }
    .trend-bars { display:flex; flex-direction:column; gap:7px; }
    .trend-row { display:flex; align-items:center; gap:10px; }
    .trend-label { flex-shrink:0; width:105px; font-size:.7rem; font-weight:600; color:rgba(255,255,255,.75); text-align:right; }
    .trend-bar-wrap { flex:1; background:rgba(255,255,255,.08); border-radius:4px; height:9px; overflow:hidden; }
    .trend-bar { height:100%; border-radius:4px; background:linear-gradient(90deg,#c8a96e,#e8c98e); transition:width .7s ease; }
    .trend-count { flex-shrink:0; font-size:.67rem; color:rgba(255,255,255,.4); width:28px; }

    /* ── 정책 / 해외기관 공통 highlight box ── */
    .hi-section { border-radius:14px; overflow:hidden; margin-bottom:22px; }
    .hi-section.domestic { border:2px solid #12233d; }
    .hi-section.intl     { border:2px solid #8b0000; }
    .hi-header { padding:11px 18px; display:flex; align-items:center; justify-content:space-between; }
    .hi-section.domestic .hi-header { background:#12233d; }
    .hi-section.intl     .hi-header { background:#8b0000; }
    .hi-header-title { font-size:.68rem; font-weight:900; letter-spacing:.15em; text-transform:uppercase; color:#c8a96e; display:flex; align-items:center; gap:7px; }
    .hi-period { font-size:.65rem; color:rgba(255,255,255,.38); }
    .hi-list { background:#fff; }
    .hi-item { display:flex; align-items:center; gap:9px; padding:9px 14px; border-bottom:1px solid #f0ece4; transition:background .12s; }
    .hi-item:last-child { border-bottom:none; }
    .hi-item:hover { background:#faf9f7; }
    .hi-item .kw { flex-shrink:0; font-size:.6rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase; padding:2px 7px; border-radius:20px; }
    .hi-item-titles { flex:1; min-width:0; }
    .hi-item-titles a { font-size:.83rem; font-weight:600; color:#12233d; text-decoration:none; line-height:1.4; display:block; }
    .hi-item-titles a:hover { color:#1a4fa0; text-decoration:underline; }
    .hi-item-titles .en-title { font-size:.7rem; color:#bbb; font-style:italic; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .hi-item-meta { flex-shrink:0; font-size:.65rem; color:#bbb; text-align:right; white-space:nowrap; }

    /* ── 즐겨찾기 ── */
    #bookmark-section { margin-bottom:26px; display:none; }

    /* ── 섹션 헤더 ── */
    .section-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .section-rule { flex:1; height:1px; background:#c8a96e; }
    .section-title { font-size:.68rem; font-weight:900; letter-spacing:.15em; text-transform:uppercase; white-space:nowrap; }
    .section-title.y2026 { color:#12233d; }
    .section-title.y2025 { color:#607d8b; }
    .section-title.bookmark-title { color:#b07d10; }
    .section-title.source-title { color:#444; }

    /* ── 카드 그리드 ── */
    .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(285px,1fr)); gap:14px; }
    .news-card { background:#fff; border-radius:10px; border:1px solid #e8e3da; padding:15px 15px 11px; display:flex; flex-direction:column; gap:8px; transition:box-shadow .2s,transform .2s; }
    .news-card:hover { box-shadow:0 6px 22px rgba(18,35,61,.1); transform:translateY(-2px); }
    .news-card.read { opacity:.5; }
    .news-card.read:hover { opacity:.72; }

    /* 국기 표시 */
    .news-card.intl { border-left:3px solid #8b0000; }

    .card-top { display:flex; align-items:center; justify-content:space-between; }
    .card-badges { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
    .kw { font-size:.61rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase; padding:2px 7px; border-radius:20px; }
    .kw.market { background:#e8eef8; color:#1a4fa0; }
    .kw.launch { background:#e6f4ed; color:#1b7a45; }
    .kw.mfds   { background:#fff0e0; color:#c05000; }
    .kw.mohw   { background:#f2e8fa; color:#6a1b9a; }
    .kw.hira   { background:#e0f4f4; color:#00695c; }
    .kw.fda    { background:#fde8e8; color:#c0392b; }
    .kw.ema    { background:#e3ecfb; color:#1565c0; }
    .kw.who    { background:#e0f4ee; color:#00695c; }
    .new-pill { font-size:.58rem; font-weight:800; letter-spacing:.06em; background:#e53935; color:#fff; padding:2px 6px; border-radius:20px; animation:pulse 2s infinite; }
    .today-pill { font-size:.56rem; font-weight:900; letter-spacing:.06em; background:#1b7a45; color:#fff; padding:2px 6px; border-radius:20px; vertical-align:middle; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.65} }
    .btn-bookmark { background:none; border:none; cursor:pointer; font-size:.95rem; color:#ddd; transition:color .15s,transform .15s; padding:0; }
    .btn-bookmark:hover { transform:scale(1.2); }
    .btn-bookmark.on { color:#c8a96e; }

    /* 카드 제목 */
    .card-title-ko { font-size:.87rem; font-weight:700; color:#12233d; text-decoration:none; line-height:1.5; display:block; }
    .card-title-ko:hover { color:#1a4fa0; }
    .news-card.read .card-title-ko { color:#aaa; font-weight:400; }
    .card-title-ko mark { background:#fff3b0; color:inherit; border-radius:2px; padding:0 1px; }
    .card-title-en { font-size:.7rem; color:#bbb; font-style:italic; line-height:1.4; margin-top:2px; }

    .card-footer { display:flex; align-items:center; justify-content:space-between; border-top:1px solid #f0ece4; padding-top:8px; margin-top:auto; }
    .card-source { font-size:.67rem; font-weight:700; color:#aaa; }
    .card-date   { font-size:.65rem; color:#ccc; }

    .group-block { margin-bottom:30px; }
    .empty { text-align:center; padding:56px 24px; color:#bbb; font-size:.88rem; display:none; }

    footer { text-align:center; font-size:.68rem; color:#ccc; padding:18px 20px 24px; border-top:1px solid #e5e0d5; max-width:1080px; margin:0 auto; }

    /* ── 카드 액션 버튼 ── */
    .card-actions { display:flex; align-items:center; gap:4px; }
    .btn-action {
      background:none; border:none; cursor:pointer; padding:3px 6px;
      font-size:.75rem; color:#ccc; border-radius:5px;
      transition:background .12s, color .12s; font-family:inherit; line-height:1;
    }
    .btn-action:hover { background:#f0ece4; color:#555; }
    .btn-action.memo-on { color:#c8a96e; }

    /* ── 메모 영역 ── */
    .memo-box {
      margin-top:2px; display:none; flex-direction:column; gap:5px;
      background:#fffdf5; border:1px solid #e8d98e; border-radius:7px; padding:8px 10px;
    }
    .memo-box.open { display:flex; }
    .memo-textarea {
      width:100%; min-height:56px; resize:vertical; border:none; outline:none;
      font-size:.78rem; font-family:inherit; color:#444; background:transparent; line-height:1.6;
    }
    .memo-textarea::placeholder { color:#ccc; }
    .memo-save-row { display:flex; justify-content:flex-end; gap:6px; }
    .memo-save-btn {
      padding:3px 10px; font-size:.7rem; font-weight:700; border:none; border-radius:5px;
      cursor:pointer; font-family:inherit;
    }
    .memo-save-btn.save { background:#12233d; color:#fff; }
    .memo-save-btn.del  { background:#f0ece4; color:#888; }
    .memo-preview {
      font-size:.75rem; color:#7a6020; background:#fffdf5;
      border-left:3px solid #c8a96e; padding:4px 8px; border-radius:0 5px 5px 0;
      line-height:1.5; white-space:pre-wrap;
    }

    /* ── 토스트 알림 ── */
    #toast {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(12px);
      background:#12233d; color:#fff; font-size:.78rem; font-weight:600;
      padding:8px 20px; border-radius:20px; opacity:0;
      transition:opacity .25s, transform .25s; pointer-events:none; z-index:999;
      box-shadow:0 4px 16px rgba(0,0,0,.2);
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── 이슈별 그룹 ── */
    .issue-badge {
      display:inline-flex; align-items:center; gap:6px;
      font-size:.68rem; font-weight:900; letter-spacing:.1em; text-transform:uppercase;
      color:#fff; padding:3px 14px; border-radius:20px; margin-bottom:10px;
    }

    /* ── 필터 상태 바 ── */
    .filter-bar {
      background:#fff; border-bottom:1px solid #f0ece4;
      padding:6px 20px; font-size:.72rem; color:#888;
      display:flex; align-items:center; gap:8px;
    }
    .filter-bar-inner { max-width:1080px; margin:0 auto; width:100%; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .filter-chip {
      display:inline-flex; align-items:center; gap:4px;
      background:#f0f3f8; color:#12233d; font-weight:700;
      font-size:.68rem; padding:2px 9px; border-radius:12px;
    }
    .filter-result { color:#888; }
    .filter-unread { color:#e53935; font-weight:700; margin-left:auto; }

    /* ── 섹션 접기/펼치기 ── */
    .collapse-btn {
      background:none; border:none; cursor:pointer; color:rgba(255,255,255,.5);
      font-size:.8rem; padding:2px 6px; border-radius:4px; transition:all .15s;
      font-family:inherit; line-height:1;
    }
    .collapse-btn:hover { background:rgba(255,255,255,.1); color:#fff; }
    .collapse-btn.light { color:#bbb; }
    .collapse-btn.light:hover { background:#f0ece4; color:#555; }
    .collapsible { transition:all .2s; overflow:hidden; }
    .collapsed .collapsible { display:none; }
    .collapse-btn .icon { display:inline-block; transition:transform .2s; }
    .collapsed .collapse-btn .icon { transform:rotate(-90deg); }

    /* ── Featured 카드 ── */
    .news-card.featured {
      grid-column: 1 / -1;
      border-left:4px solid #c8a96e; background:linear-gradient(to right,#fffdf7,#fff);
      box-shadow:0 2px 12px rgba(200,169,110,.18);
    }
    .news-card.featured .card-title-ko { font-size:1rem; }
    .featured-label {
      font-size:.6rem; font-weight:900; letter-spacing:.12em; text-transform:uppercase;
      color:#c8a96e; margin-bottom:2px;
    }

    /* ── 미읽음 배지 ── */
    .unread-dot {
      display:inline-block; width:6px; height:6px; border-radius:50%;
      background:#e53935; margin-left:2px; vertical-align:middle;
      animation:pulse 2s infinite;
    }

    /* ── 교차 이슈 태그 ── */
    .cross-issue-tag {
      display:inline-flex; align-items:center; gap:3px;
      font-size:.6rem; color:#888; background:#f0ece4;
      padding:1px 6px; border-radius:8px; margin-top:2px;
      cursor:default;
    }

    @media(max-width:640px) {
      .masthead h1{font-size:1.4rem}
      .toolbar-right{display:none}
      .card-grid{grid-template-columns:1fr}
      .trend-label{width:76px;font-size:.64rem}
      .hi-item-meta{display:none}
    }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- MASTHEAD -->
<div class="masthead">
  <div class="masthead-eyebrow">Pharma Intelligence Brief</div>
  <h1>제약시장 뉴스</h1>
  <div class="masthead-tagline">국내 · FDA · EMA · WHO — 제약·의약품 주요 기사 모음</div>
  <div class="masthead-meta">
    <span>📅 2026년 3월 13일</span>
    <span>🔍 2025년 상반기 ~ 현재</span>
    <span id="total-count">📰 총 —건</span>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="기사 제목 검색…" oninput="onSearch(this.value)">
      <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
    </div>

    <div class="tab-group">
      <button class="tab active" onclick="setKw('all',this)">전체 <span class="tab-count" id="cnt-all"></span></button>
      <button class="tab" onclick="setKw('market',this)">시장 전망 <span class="tab-count" id="cnt-market"></span></button>
      <button class="tab" onclick="setKw('launch',this)">의약품 출시 <span class="tab-count" id="cnt-launch"></span></button>
      <button class="tab" onclick="setKw('policy',this)">정책·규제 <span class="tab-count" id="cnt-policy"></span></button>
    </div>

    <div class="tab-sep"></div>

    <div class="tab-group">
      <span class="tab-group-label">해외</span>
      <button class="tab fda-tab" onclick="setKw('fda',this)">FDA <span class="tab-count" id="cnt-fda"></span></button>
      <button class="tab ema-tab" onclick="setKw('ema',this)">EMA <span class="tab-count" id="cnt-ema"></span></button>
      <button class="tab who-tab" onclick="setKw('who',this)">WHO <span class="tab-count" id="cnt-who"></span></button>
    </div>

    <div class="toolbar-right">
      <div class="date-filter">
        <button class="date-btn active" onclick="setRange('all',this)">전체</button>
        <button class="date-btn" onclick="setRange('6',this)">6개월</button>
        <button class="date-btn" onclick="setRange('3',this)">3개월</button>
        <button class="date-btn" onclick="setRange('1',this)">1개월</button>
      </div>
      <div class="divider-v"></div>
      <div class="group-toggle">
        <button class="grp-btn active" onclick="setGroup('year',this)">연도별</button>
        <button class="grp-btn" onclick="setGroup('source',this)">출처별</button>

/* ── localStorage ─────────────────── */
const getBookmarks = () => JSON.parse(localStorage.getItem('ph_bm')||'[]');
const setBookmarks = v  => localStorage.setItem('ph_bm', JSON.stringify(v));
const getRead      = () => JSON.parse(localStorage.getItem('ph_rd')||'[]');
function markRead(id) {
  const r=getRead(); if(!r.includes(id)){r.push(id);localStorage.setItem('ph_rd',JSON.stringify(r));}
}
const getMemos  = () => JSON.parse(localStorage.getItem('ph_memo')||'{}');
const getMemo   = id => getMemos()[id]||'';

/* ── 토스트 ───────────────────────── */
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ── 클립보드 복사 ─────────────────── */
function copyCard(id){
  const a=ARTICLES.find(x=>x.id===id); if(!a) return;
  const text=`${a.titleKo}\n${a.url}`;
  navigator.clipboard.writeText(text).then(()=>showToast('📋 클립보드에 복사되었습니다')).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast('📋 복사되었습니다');
  });
}

/* ── 메모 ─────────────────────────── */
function toggleMemo(id){
  const box=document.getElementById('memo-box-'+id);
  if(!box) return;
  const open=box.classList.toggle('open');
  if(open) box.querySelector('textarea').focus();
}
function saveMemo(id){
  const ta=document.getElementById('memo-ta-'+id);
  if(!ta) return;
  setMemoData(id,ta.value.trim());
  showToast('✏️ 메모가 저장되었습니다');
  render();
}
function deleteMemo(id){
  setMemoData(id,'');
  showToast('메모가 삭제되었습니다');
  render();
}

/* ── 유틸 ─────────────────────────── */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hl(text){
  const q=state.search; if(!q) return esc(text);
  const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}

/* ── 필터 ─────────────────────────── */
function filtered(overrideKw){
  const kw=overrideKw!==undefined?overrideKw:state.kw;
  const now=new Date('2026-03-13');
  return ARTICLES.filter(a=>{
    if(kw==='policy'){if(!POLICY_KW.includes(a.kw))return false;}
    else if(kw!=='all'&&a.kw!==kw)return false;
    if(state.range!=='all'){
      if((now-new Date(a.date))/(1000*60*60*24*30)>parseInt(state.range))return false;
    }
    if(state.search){
      const q=state.search.toLowerCase();
      const t=(a.titleKo+(a.titleEn||'')+a.source).toLowerCase();
      if(!t.includes(q))return false;
    }
    return true;
  });
}

/* ── 트렌드 ───────────────────────── */
function renderTrend(){
  const counts=TREND_KEYWORDS.map(k=>{
    const cnt=ARTICLES.filter(a=>k.terms.some(t=>a.titleKo.includes(t)||(a.titleEn||'').includes(t))).length;
    return{...k,cnt};
  }).filter(k=>k.cnt>0).sort((a,b)=>b.cnt-a.cnt);
  const max=counts[0]?.cnt||1;
  document.getElementById('trend-bars').innerHTML=counts.map(k=>`
    <div class="trend-row">
      <span class="trend-label">${k.label}</span>
      <div class="trend-bar-wrap"><div class="trend-bar" style="width:${Math.round(k.cnt/max*100)}%"></div></div>
      <span class="trend-count">${k.cnt}건</span>

}

/* ── 카운트 (미읽음 포함) ──────────── */
function updateCounts(){
  const rd=getRead();
  ['all','market','launch','policy','fda','ema','who'].forEach(k=>{

    const arts=filtered();
    const n=arts.length;

    state.kw=prev;

function updateFilterBar(){
  const arts=filtered();
  const rd=getRead();
  const unread=arts.filter(a=>!rd.includes(a.id)).length;
  const chips=[];
  if(state.kw!=='all'){
    const label=state.kw==='policy'?'정책·규제':(KW_LABEL[state.kw]||state.kw);
    chips.push(`<span class="filter-chip">📌 ${label}</span>`);
  }

  if(state.search) chips.push(`<span class="filter-chip">🔍 "${esc(state.search)}"</span>`);
  const el=document.getElementById('filter-bar-inner');
  if(el) el.innerHTML=`<span class="filter-result">${arts.length}건 표시</span>${chips.join('')}${unread>0?`<span class="filter-unread">미읽음 ${unread}건</span>`:''}`;

];

function renderIssue(arts){
  // 각 기사가 매칭되는 모든 그룹 레이블을 수집
  const articleAllGroups=new Map();
  ISSUE_GROUPS.forEach(grp=>{
    arts.forEach(a=>{
      if(grp.terms.some(t=>a.titleKo.includes(t)||(a.titleEn||'').includes(t))){
        if(!articleAllGroups.has(a.id)) articleAllGroups.set(a.id,[]);
        articleAllGroups.get(a.id).push(grp.label);
      }
    });
  });

  // 첫 번째 매칭 그룹에만 기사 배정 (중복 방지)
  const assigned=new Map();
  const assignedIds=new Set();
  ISSUE_GROUPS.forEach(grp=>{
    arts.forEach(a=>{
      if(assignedIds.has(a.id)) return;
      if(grp.terms.some(t=>a.titleKo.includes(t)||(a.titleEn||'').includes(t))){
        assignedIds.add(a.id);
        if(!assigned.has(grp.label)) assigned.set(grp.label,[]);
        assigned.get(grp.label).push(a);
      }
    });
  });

  let html='';
  ISSUE_GROUPS.forEach(grp=>{
    const matched=assigned.get(grp.label);
    if(!matched||!matched.length) return;
    const cards=matched.map((a,i)=>{
      const allGrps=articleAllGroups.get(a.id)||[];
      const secondary=allGrps.filter(g=>g!==grp.label);
      return cardHTML(a, i===0, secondary);
    }).join('');
    html+=`
    <div class="group-block">
      <div style="margin-bottom:10px">
        <span class="issue-badge" style="background:${grp.color}">${grp.label} <span style="opacity:.65;font-weight:400">${matched.length}건</span></span>
      </div>
      <div class="card-grid">${cards}</div>
    </div>`;
  });

  // 어느 이슈에도 속하지 않는 기사
  const others=arts.filter(a=>!assignedIds.has(a.id));
  if(others.length){
    html+=`
    <div class="group-block">
      ${sectionHeader('source-title','기타')}
      <div class="card-grid">${others.map(a=>cardHTML(a)).join('')}</div>
    </div>`;
  }
  return html;
}

/* ── 전체 렌더 ─────────────────────── */
function render(){
  updateCounts();updateFilterBar();renderBookmarks();
  const arts=filtered();
  const content=document.getElementById('content');

  if(!arts.length){content.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  content.innerHTML=state.groupBy==='year'?renderYear(arts):state.groupBy==='source'?renderSource(arts):renderIssue(arts);
}

}
function onSearch(v){state.search=v.trim();document.getElementById('clear-btn').style.display=v?'block':'none';render();}
function clearSearch(){document.getElementById('search-input').value='';onSearch('');}
function toggleBookmark(id){let bm=getBookmarks();bm=bm.includes(id)?bm.filter(x=>x!==id):[...bm,id];setBookmarks(bm);render();}

/* ── 스크롤 위치 저장 (연속) ──────── */
window.addEventListener('scroll', ()=>{
  sessionStorage.setItem('scroll_y', window.scrollY);
}, {passive:true});

/* ── 초기 실행 ─────────────────────── */
renderTrend();
renderPolicy();
renderIntl();
render();

// 섹션 접힘 상태 복원
['policy-sec','intl-sec'].forEach(id=>{
  if(sessionStorage.getItem('sec_'+id)==='1'){
    const el=document.getElementById(id);
    if(el) el.classList.add('collapsed');
  }
});

// 스크롤 위치 복원
const savedY=sessionStorage.getItem('scroll_y');
if(savedY) requestAnimationFrame(()=>window.scrollTo(0,parseInt(savedY)));
</script>
</body>
</html>
